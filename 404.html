<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';">
    <title>404 — Page Not Found | Vitor Schiavo</title>
    <meta name="robots" content="noindex">
    <!-- data:, suppresses the browser's automatic /favicon.ico request on the error page -->
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Design tokens imported from the shared stylesheet — do not duplicate values here.
         Root-absolute path matches the GitHub Pages deployment (served at the domain root). -->
    <link rel="stylesheet" href="/styles.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
            max-width: 480px;
        }

        .code {
            font-size: clamp(6rem, 20vw, 9rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -4px;
            margin-bottom: 1.5rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .desc {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .path {
            display: inline-block;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            padding: 0.25rem 0.75rem;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            word-break: break-all;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
            cursor: pointer;
            border: none;
        }

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 3px; }

        .btn-primary {
            background: var(--primary);
            color: var(--on-primary, #fff);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        @media (prefers-reduced-motion: reduce) {
            .btn { transition: none; }
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="code" role="img" aria-label="Error 404">404</div>
        <h1 class="title">Page not found</h1>
        <p class="desc">This URL doesn't exist or may have been moved.</p>
        <p class="path" id="current-path">(unknown path)</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">Go home</a>
            <button type="button" id="go-back-btn" class="btn btn-secondary">Go back</button>
        </div>
    </main>
    <script>
        const el = document.getElementById('current-path');
        if (el) el.textContent = location.pathname + location.search;

        // Use history.length > 1 as primary guard (more reliable than referrer,
        // which can be stripped by privacy settings / Referrer-Policy headers).
        const backBtn = document.getElementById('go-back-btn');
        if (backBtn) {
            backBtn.addEventListener('click', function () {
                if (history.length > 1) {
                    history.back();
                } else {
                    location.href = '/';
                }
            });
        }
    </script>
</body>
</html>
